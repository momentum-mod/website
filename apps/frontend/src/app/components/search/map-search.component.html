<input
  class="textinput mb-2 w-full flex-grow"
  [mSpinner]="search.pending"
  [placeholder]="'Search by map name...'"
  [formControl]="search"
  (keydown)="onKeydown($event)"
  type="text"
/>
@if (search.invalid && search.value.length > 0 && found.length === 0) {
  <p class="p-3 text-lg text-gray-200">
    {{ getFirstError() }}
  </p>
}
@for (map of found; track map) {
  <div
    class="flex items-center gap-4 rounded bg-white bg-opacity-0 p-2 transition-colors"
    [ngClass]="{ 'bg-opacity-5': $index === selectedIdx }"
    (mouseenter)="selectedIdx = $index"
    (click)="onSelected(map)"
  >
    <img class="aspect-video h-12" [src]="map.thumbnail.small" />
    <p class="mr-1 text-lg font-bold">{{ map.name }}</p>
  </div>
}
<p-paginator
  (onPageChange)="pageChange.next($event)"
  [first]="first"
  [rows]="rows"
  [totalRecords]="totalRecords"
  [showCurrentPageReport]="true"
  [alwaysShow]="false"
/>
